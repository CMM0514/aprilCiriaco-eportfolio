    <main class="intro-page appendix-page-modern">
      <section class="intro-hero appendix-modern-hero">
        <h1 class="intro-title">APPENDICES</h1>
        <p>
          Supporting documents for the CAST Student Internship Program arranged
          from Appendix A to Appendix R. Each card includes a brief description
          and a direct preview of the document.
        </p>
        <div class="appendix-hero-stats">
          <span id="appendix-total-count">18 appendices</span>
          <span id="appendix-complete-count">Completed: 0/18</span>

      <p class="appendix-footer-note">

    </main>

    <div id="footer-placeholder"></div>

    <div class="appendix-preview-modal" aria-hidden="true">
      <div class="appendix-preview-dialog" role="dialog" aria-modal="true">
        <button
          class="appendix-preview-close"
          type="button"
          aria-label="Close preview"
        >
          &times;
        </button>
        <h2></h2>
        <div class="appendix-preview-body">
          <img src="" alt="" />
          <article class="appendix-preview-text" hidden></article>
        </div>
        <div class="appendix-preview-controls">
          <button
            class="appendix-modal-arrow"
            id="appendix-modal-prev"
            type="button"
            aria-label="Previous page"
          >
            &lsaquo;
          </button>
          <span id="appendix-modal-page" aria-live="polite">1 / 1</span>
          <button
            class="appendix-modal-arrow"
            id="appendix-modal-next"
            type="button"
            aria-label="Next page"
          >
            &rsaquo;
          </button>
        </div>
      </div>

              `
                <p>I will use my special knowledge for the benefit of the public. I will serve employees and clients with integrity, subject to an overriding responsibility to the public interest, and I will strive to enhance the competence and prestige of the profession. By these means:</p>
                <ol>
                  <li>I will promote public knowledge understanding and appreciation of information technology.</li>

                  <li>I will not disclose any confidential information obtained in the course of professional duties without the consent of the parties concerned, except when required by law.</li>
                  <li>I will try to attain the highest quality in both the products and services that I offer.</li>

            ],

        },
        {
          letter: "Q",

          pages: [["Curriculum Vitae", "assets/curriculum%20vitae.png"]],
        },
        {
          letter: "R",
          title: "On-the-Job Training Portfolio Evaluation Form",
          pages: [
            [
              "OJT Portfolio Evaluation Form",
              "assets/ojt%20portfolio%20evaluation.jpg",
            ],
            [
              "Portfolio Evaluation Form - Page 1",
              "assets/Scanned%20picsss/student%20internship%20evaluation%20form.jpg",
            ],
            [
              "Portfolio Evaluation Form - Page 2",
              "assets/Scanned%20picsss/student%20internship%20evaluation%20form-2.jpg",

            [
              "Portfolio Evaluation Form - Page 3",
              "assets/Scanned%20picsss/student%20internship%20evaluation%20form-3.jpg",
            ],
          ],

      const list = document.getElementById("appendix-list");
      const totalCount = document.getElementById("appendix-total-count");
      const completeCount = document.getElementById("appendix-complete-count");
      const modal = document.querySelector(".appendix-preview-modal");
      const modalTitle = modal.querySelector("h2");
      const modalImage = modal.querySelector("img");
      const modalText = modal.querySelector(".appendix-preview-text");
      const modalClose = modal.querySelector(".appendix-preview-close");
      const modalPrev = document.getElementById("appendix-modal-prev");
      const modalNext = document.getElementById("appendix-modal-next");
      const modalPage = document.getElementById("appendix-modal-page");

      let activeAppendixIndex = 0;
      let activePageIndex = 0;
      let lastPreviewTrigger = null;

      const appendixDescriptions = {
        A: "Registrar evaluation document used to assess internship readiness and requirements.",
        B: "Validated registration record confirming enrollment for the internship period.",
        C: "Identification documents submitted as part of the OJT requirement set.",
        D: "Signed consent form confirming parental approval for internship participation.",
        E: "Medical and dental certification showing student fitness for training.",
        F: "Good moral character certificate from the school.",
        G: "Formal application letter for the on-the-job training placement.",
        H: "School endorsement letter addressed to the placement agency.",
        I: "Memorandum of Agreement between the school and training agency.",
        J: "Monthly time card records documenting attendance and rendered hours.",
        K: "Completion certificate issued after finishing the required training hours.",
        L: "Agency clearance confirming fulfilled responsibilities during the placement.",
        M: "Performance rating sheet evaluating internship output and work conduct.",
        N: "Photos documenting attendance during the pre-service seminar.",
        O: "Photo documentation of office work activities throughout the training period.",
        P: "CAST Student Internship ethics guide and professional conduct standards.",
        Q: "Curriculum vitae summarizing personal, academic, and professional information.",
        R: "Portfolio evaluation forms used for final internship assessment.",
      };

      const completedAppendices = appendices.filter(
        (appendix) => appendix.pages.length > 0,
      ).length;

      totalCount.textContent = `${appendices.length} appendices`;
      completeCount.textContent = `Completed: ${completedAppendices}/${appendices.length}`;

      function renderList() {
        appendices.forEach((appendix, index) => {
          const hasPages = appendix.pages.length > 0;
          const firstPage = hasPages ? appendix.pages[0] : null;
          const isTextOnly = hasPages && firstPage[1] === "text";
          const thumbSrc = hasPages && !isTextOnly ? firstPage[1] : "";
          const pageCountLabel =
            appendix.pages.length === 1 ? "1 page" : `${appendix.pages.length} pages`;
          const card = document.createElement("article");
          card.className = "appendix-card";
          card.tabIndex = hasPages ? 0 : -1;
          card.setAttribute(
            "aria-label",
            hasPages
              ? `View Appendix ${appendix.letter}: ${appendix.title}`
              : `Appendix ${appendix.letter}: ${appendix.title} is pending`,
          );
          card.innerHTML = `
            <div class="appendix-thumb">
              ${
                thumbSrc
                  ? `<img src="${thumbSrc}" alt="${appendix.title} thumbnail" loading="lazy" />`
                  : `<div class="appendix-thumb-placeholder"><strong>${isTextOnly ? "TXT" : "DOC"}</strong></div>`
              }
              <div class="appendix-thumb-overlay">
                <span class="appendix-zoom-icon" aria-hidden="true">+</span>
                <strong>${hasPages ? "Click to view" : "Pending"}</strong>
              </div>
            </div>

            <div class="appendix-card-content">
              <div class="appendix-card-topline">
                <span>Appendix ${appendix.letter}</span>
                <small>${hasPages ? pageCountLabel : "Pending"}</small>
              </div>
              <h2>${appendix.title}</h2>
              <p>${appendixDescriptions[appendix.letter]}</p>
              <button class="appendix-card-button" type="button" ${hasPages ? "" : "disabled"}>
                ${hasPages ? "View Document" : "Pending"}
              </button>
            </div>
          `;

          const button = card.querySelector(".appendix-card-button");
          card.addEventListener("click", () => openPreview(index, card));
          card.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              openPreview(index, card);
            }
          });
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            openPreview(index, button);
          });
          list.appendChild(card);
        });
      }

      function updateListState() {
        document.querySelectorAll(".appendix-card").forEach((card, index) => {
          card.classList.toggle("active", index === activeAppendixIndex);
        });
      }

      function renderPreviewPage() {
        const appendix = appendices[activeAppendixIndex];
        const page = appendix.pages[activePageIndex];
        const isTextPage = page[1] === "text";

        modalTitle.textContent = `Appendix ${appendix.letter}: ${appendix.title}`;
        modalImage.hidden = isTextPage;
        modalText.hidden = !isTextPage;

        if (isTextPage) {
          modalImage.removeAttribute("src");
          modalText.innerHTML = page[2];
        } else {
          modalText.innerHTML = "";
          modalImage.src = page[1];
          modalImage.alt = `${appendix.title} - ${page[0]}`;
        }

        modalPage.textContent = `${activePageIndex + 1} / ${appendix.pages.length}`;
        modalPrev.disabled = appendix.pages.length < 2;
        modalNext.disabled = appendix.pages.length < 2;
        updateListState();
      }

      function openPreview(index, trigger) {
        const appendix = appendices[index];
        if (appendix.pages.length === 0) return;
        activeAppendixIndex = index;
        activePageIndex = 0;
        lastPreviewTrigger = trigger;
        renderPreviewPage();
        modal.classList.add("show");
        modal.setAttribute("aria-hidden", "false");
      }

      function closePreview() {
        modal.classList.remove("show");
        modal.setAttribute("aria-hidden", "true");
        modalImage.src = "";
        modalText.innerHTML = "";
        lastPreviewTrigger?.focus();
      }

      function changeModalPage(direction) {
        const pages = appendices[activeAppendixIndex].pages;
        if (pages.length < 2) return;
        activePageIndex = (activePageIndex + direction + pages.length) % pages.length;
        renderPreviewPage();
      }

      modalPrev.addEventListener("click", () => changeModalPage(-1));
      modalNext.addEventListener("click", () => changeModalPage(1));
      modalClose.addEventListener("click", closePreview);
      modal.addEventListener("click", (event) => {
        if (event.target === modal) closePreview();
      });
      window.addEventListener("keydown", (event) => {
        const modalOpen = modal.classList.contains("show");
        if (!modalOpen) return;

        if (event.key === "Escape") {
          closePreview();
        }
        if (event.key === "ArrowLeft") {
          event.preventDefault();
          changeModalPage(-1);
        }
        if (event.key === "ArrowRight") {
          event.preventDefault();
          changeModalPage(1);
        }
      });

      renderList();
    </script>
