<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Hero Mockup</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
  <div id="nav-placeholder"></div>
    <main class="container">
   
      <!-- HERO -->
      <section class="hero">
        <div class="hero-text">
          <div class="hero-logos">
            <img src="assets/omsc.png" alt="School Logo" />
            <img src="assets/cast.png" alt="Department Logo" />
            <img src="assets/omeco.png" alt="Agency Logo" />
            <img src="assets/Nea.png" alt="Company Logo" />
          </div>
          <h1>APRIL MEA E. CIRIACO</h1>
          <p>
            A BSIT student currently in training, developing practical skills in
            web development and digital solutions.
          </p>
          <a href="introduction.html" class="hero-btn">Let’s Get Started →</a>
        </div>

        <div class="hero-image">
          <div class="profile-mockup">
            <div class="profile-mask">
              <img src="assets/profile.png" alt="Profile" />
            </div>

            <img class="profile-head" src="assets/profile.png" alt="Profile" />
          </div>
        </div>
      </section>
    </div>

    <script>
        fetch('nav.html')
    .then(res => res.text())
    .then(data => {
      document.getElementById('nav-placeholder').innerHTML = data;
    });
    
      document.querySelectorAll('a[href^="#"]').forEach((link) => {
        link.addEventListener("click", function (e) {
          e.preventDefault();

          const target = document.querySelector(this.getAttribute("href"));

          if (target) {
            target.scrollIntoView({
              behavior: "smooth",
              block: "start",
            });
          }
        });
      });
    </script>
  </body>
</html>
